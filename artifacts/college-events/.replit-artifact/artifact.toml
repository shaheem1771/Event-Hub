kind = "web"
previewPath = "/"
title = "College Event Manager"
version = "1.0.0"
id = "artifacts/college-events"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26033

[services.development]
run = "pnpm --filter @workspace/college-events run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/college-events", "run", "build" ]
publicDir = "artifacts/college-events/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26033"
BASE_PATH = "/"
